title: 'Block - Fifty-Fifty'
fields:
  -
    handle: image
    field:
      max_files: 1
      mode: grid
      container: assets
      type: assets
      display: Image
  -
    handle: content
    field:
      buttons:
        - h2
        - h3
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - image
        - table
        - h4
      remove_empty_nodes: false
      type: bard
      display: Content
      save_html: true
  -
    handle: section_id
    field: section_anchor_id.section_id
