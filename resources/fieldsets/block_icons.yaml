title: 'Block - Icons'
fields:
  -
    handle: section_id
    field: section_anchor_id.section_id
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: textarea
    field:
      type: textarea
      display: Textarea
  -
    handle: icon_groups
    field:
      mode: stacked
      type: grid
      display: 'Icon Groups'
      fields:
        -
          handle: group_label
          field:
            type: text
            display: 'Group Label'
        -
          handle: icons
          field:
            type: grid
            display: Icons
            mode: stacked
            fields:
              -
                handle: devicon_class
                field:
                  type: text
                  display: 'Devicon Class'
              -
                handle: icon_link
                field:
                  input_type: url
                  type: text
                  display: 'Icon Link'
